services:
  mongodb:
    image: mongo:latest
    container_name: txio-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  api:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: txio-api
    env_file:
      - ./backend/api/.env
    environment:
      MONGO_URI: mongodb://mongodb:27017/txio
      RUST_LOG: info
      JWT_SECRET: dev-secret-key-at-least-32-chars-long-12345
      BREVO_API_KEY: dummy-key
      PORT: 8000
      SUI_CLI_EMAIL: dev@txio.io
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: txio-frontend
    ports:
      - "5173:80"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - api

volumes:
  mongodb_data:
